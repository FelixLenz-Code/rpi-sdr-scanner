name: Build & Release .deb

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version aus Tag extrahieren
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: .deb bauen
        run: bash packaging/build_deb.sh ${{ steps.version.outputs.VERSION }}

      - name: Release erstellen und .deb hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sdr-scanner_${{ steps.version.outputs.VERSION }}_arm64.deb
          generate_release_notes: true
